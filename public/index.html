	<script>
		document.addEventListener("DOMContentLoaded", async function () {
			try {
				const response = await fetch(
					"https://api.nasa.gov/planetary/apod?api_key=YunabUb45a5nweqX21iAZxeC4EsawKtxpvlsiYXU&count=8&thumbs=true"
				);

				const data = await response.json();

				
				let chosen = data.find(item => item.media_type === "image" && item.url);

				
				if (!chosen) {
					chosen = data.find(item => item.thumbnail_url);
				}

				if (!chosen) return;

				const backgroundUrl = chosen.hdurl || chosen.url || chosen.thumbnail_url;

				const img = new Image();
				img.src = backgroundUrl;

				img.onload = function () {
					document.documentElement.style.setProperty(
						'--background-image',
						`url('${backgroundUrl}')`
					);
					document.body.classList.add('image-loaded');
				};
			} catch (error) {
				console.error("No se pudo cargar la imagen de fondo:", error);
			}
		});
